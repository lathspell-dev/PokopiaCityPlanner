<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pokopia City Planner — Maqueta</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app" class="page">
        <!-- TOP: habitat -->
        <header class="top">
            <section class="habitat-display" aria-label="Habitat display">
                <div class="habitat-bg"></div>

                <!-- ejemplo hasta 4 pokemons posicionados -->
                <div class="pokemon-pin" style="left: 12%; top: 20%;" data-id="1" data-name="Pikachu" tabindex="0">
                    <img alt="Pikachu">
                    <div class="pokemon-tooltip">Pikachu — Nivel 12<br>Tipo: Eléctrico</div>
                </div>

                <div class="pokemon-pin" style="left: 46%; top: 40%;" data-id="2" data-name="Bulbasaur" tabindex="0">
                    <img alt="Bulbasaur">
                    <div class="pokemon-tooltip">Bulbasaur — Nivel 8<br>Tipo: Planta</div>
                </div>

                <div class="pokemon-pin" style="left: 70%; top: 18%;" data-id="3" data-name="Charmander" tabindex="0">
                    <img alt="Charmander">
                    <div class="pokemon-tooltip">Charmander — Nivel 10<br>Tipo: Fuego</div>
                </div>

                <div class="pokemon-pin" style="left: 58%; top: 66%;" data-id="4" data-name="Squirtle" tabindex="0">
                    <img alt="Squirtle">
                    <div class="pokemon-tooltip">Squirtle — Nivel 9<br>Tipo: Agua</div>
                </div>
            </section>

            <aside class="habitat-stats" aria-label="Habitat stats">
                <div class="stats-title">
                    <h2>Estadísticas del hábitat</h2>
                    <span id="habitat-indicator" class="compatibility-indicator"/>
                </div>

                <div class="stats-category">
                    <h3>Preferencias</h3>
                    <div class="stat-list">
                        <!--<div class="stat-badge">
                            <span class="stat-name">Hierba</span>
                            <div class="stat-pokemons">
                                <img alt="">
                                <img alt="">
                            </div>
                        </div>

                        <div class="stat-badge">
                            <span class="stat-name">Piedra</span>
                            <div class="stat-pokemons">
                                <img alt="">
                            </div>
                        </div>-->
                    </div>
                </div>

                <!--<div class="stats-category">
                    <h3>Unicas</h3>
                    <div class="stat-list">
                        <div class="stat-badge">
                            <span class="stat-name">Luz lunar</span>
                            <div class="stat-pokemons">
                                <img alt="">
                            </div>
                        </div>
                    </div>
                </div>-->

                <div class="stats-category">
                    <h3>Comida</h3>
                    <div class="stat-list">
                        <!--<div class="stat-badge">
                            <span class="stat-name">Frutas</span>
                            <div class="stat-pokemons">
                                <img alt="">
                                <img alt="">
                                <img alt="">
                            </div>
                        </div>-->
                    </div>
                </div>

                <div class="stats-category">
                    <h3>Entorno</h3>
                    <div class="stat-list">
                        <!--<div class="stat-badge">
                            <span class="stat-name">Rocas</span>
                            <div class="stat-pokemons">
                                <img alt="">
                            </div>
                        </div>-->
                    </div>
                </div>

                <!-- Nueva categoría: Especialidades -->
                <div class="stats-category">
                    <h3>Especialidades</h3>
                    <div class="stat-list">
                        <!--<div class="stat-badge">
                            <span class="stat-name">Baile nocturno</span>
                            <div class="stat-pokemons">
                                <img alt="">
                            </div>
                        </div>

                        <div class="stat-badge">
                            <span class="stat-name">Camuflaje</span>
                            <div class="stat-pokemons">
                                <img alt="">

                            </div>
                        </div>-->
                    </div>
                </div>
                <!-- /Especialidades -->

            </aside>
        </header>

        <!-- BOTTOM: search area -->
        <main class="bottom" aria-label="Search area">
            <section class="filters">
                <div class="filter-row">
                    <input id="filter-name" placeholder="Filtrar por nombre" type="text">
                    <select id="filter-speciality">
                        <option value="" selected hidden>Especialidad</option>
                    </select>
                    <select id="filter-speciality-litter">
                        <option value="" selected hidden>Material producido</option>
                    </select>
                    <select id="filter-area">
                        <option value="" selected hidden>Área original</option>
                        <option value="Estepa Esteril">Estepa Esteril</option>
                        <option value="Bahia Borrasca">Bahia Borrasca</option>
                        <option value="Riscos Rocosos">Riscos Rocosos</option>
                        <option value="Islas Aisladas">Islas Aisladas</option>
                        <option value="Pradera Paleta">Pradera Paleta</option>
                    </select>
                    <div id="exclude-especial-div">
                        <input id="exclude-especial" type="checkbox" />
                        <label for="exclude-especial">Excluir habitats neutrales</label>
                    </div>
                    <button id="clear-filters" type="button">Limpiar</button>
                </div>
            </section>

            <section class="pokemon-grid" id="pokemon-grid" aria-live="polite">
                <!-- mock de pokemons: grid rellenado desde JS -->
            </section>
        </main>
    </div>

    <script src="js/site.js"></script>
</body>
